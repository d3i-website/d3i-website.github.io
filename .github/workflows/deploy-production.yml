name: Deploy to Netlify (production)

on:
  workflow_dispatch:
  # Daily rebuild so future-dated ("scheduled") news surfaces on the day
  # it is due: the build clock (site.time) advances even when no commits
  # change, and the news filters drop items dated after build time.
  # Off-the-hour, low-traffic UTC slot — GitHub delays scheduled runs that
  # land on the start of an hour, so we avoid :00.
  schedule:
    - cron: "7 4 * * *"

concurrency:
  group: "deploy-production"
  cancel-in-progress: false

jobs:
  # Manual promote: main HEAD → production, gated by the `production`
  # environment's required reviewer. This is the only path that ships new
  # content to the live site.
  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://datadonation.eu
    outputs:
      sha: ${{ steps.rev.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Resolve deployed commit
        id: rev
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './_site'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Manual deploy - ${{ steps.rev.outputs.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # The manual deploy doubles as the "promote" step: record the commit just
  # shipped on the `production` branch so the scheduled job below redeploys
  # exactly this approved snapshot. Separate job so the deploy job keeps its
  # default token permissions (the Netlify action needs them); only this one
  # is elevated to write a ref.
  record-snapshot:
    needs: deploy-manual
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Move production branch to the deployed commit
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ needs.deploy-manual.outputs.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${REPO}/git/refs/heads/production" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${REPO}/git/refs/heads/production" -f sha="${SHA}" -F force=true
          else
            gh api -X POST "repos/${REPO}/git/refs" -f ref="refs/heads/production" -f sha="${SHA}"
          fi

  # Scheduled rebuild: redeploys the already-approved `production` branch
  # (never main HEAD), so it needs no approval — it runs with NO environment
  # and reads the repository-level NETLIFY_* secrets. This only refreshes the
  # build clock so future-dated news/events surface on their due date; it
  # never ships un-promoted main work.
  #
  # Because the source commit is frozen, the rendered output is identical
  # day-to-day EXCEPT on days when a future-dated item crosses the build
  # clock. To avoid spending a Netlify deploy on those no-op days, we
  # fingerprint the build output and only deploy when it actually changed.
  deploy-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: production
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # Rolling single-value cache: restore-keys finds the most recent
      # `deploy-fingerprint-*` entry; each successful deploy saves a fresh
      # one under the run id (immutable keys can't be overwritten).
      - name: Restore previous output fingerprint
        uses: actions/cache/restore@v4
        with:
          path: .deploy-fingerprint
          key: deploy-fingerprint-${{ github.run_id }}
          restore-keys: |
            deploy-fingerprint-

      # Hash the rendered site, excluding the Atom feeds and sitemap:
      # jekyll-feed/jekyll-sitemap stamp those with the build clock
      # (site.time / file mtimes), so they churn on every build even when no
      # content surfaced. Real changes are always reflected in the HTML the
      # hash does cover, so excluding them is safe. sha256sum includes file
      # paths, so additions/renames change the fingerprint too.
      - name: Compare output fingerprint
        id: fp
        run: |
          old=""
          [ -f .deploy-fingerprint ] && old=$(cat .deploy-fingerprint)
          new=$(find _site -type f ! -path '_site/feed/*' ! -name 'sitemap.xml' -print0 \
            | LC_ALL=C sort -z | xargs -0 sha256sum | sha256sum | cut -d ' ' -f 1)
          printf '%s\n' "$new" > .deploy-fingerprint
          if [ "$new" = "$old" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ No output change since last scheduled deploy (\`$new\`); skipping Netlify deploy." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "🚀 Output changed (was \`${old:-none}\`, now \`$new\`); deploying to Netlify." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy to Netlify
        if: steps.fp.outputs.changed == 'true'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './_site'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Scheduled rebuild - production branch"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # Record the fingerprint of what is now live, only after a successful
      # deploy — a failed deploy leaves the old value so the next run retries.
      - name: Persist output fingerprint
        if: steps.fp.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .deploy-fingerprint
          key: deploy-fingerprint-${{ github.run_id }}
