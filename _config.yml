title: "D3I: A digital data donation infrastructure"
masthead_title: "datadonation.eu"
subtitle: "Europe's data donation infrastructure"
description: >-
  Europe's data donation infrastructure
baseurl: ""
url: "https://datadonation.eu"

plugins:
  - jekyll-redirect-from
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

sass:
  style: compressed
  sourcemap: never

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - migration-backup/
  - docs/
  - "*.backup"

include:
  - _pages
  - .well-known

# Contact defaults
contact_email: DataDonation@uu.nl
contact_subject: "Question about D3I"

# Collections
collections:
  events:
    output: true
    permalink: /community/events/:path/
  news:
    output: true
    permalink: /news/:path/

# Publish collection documents dated in the future (e.g. upcoming events)
future: true

# Atom feeds (jekyll-feed): /feed/news.xml and /feed/events.xml, for
# external aggregators (e.g. ODISSEI) to ingest our items.
feed:
  collections:
    - news
    - events

# Custom URLs
# newsletter_signup_url and phd_network_signup_url were retired when their
# CTAs migrated to structured `cta:` frontmatter on the relevant pages.
# open_letter_url is still consumed by _pages/community/open-letter.md.
open_letter_url: "https://dsa40collaboratory.eu/open-letter-omnibus/"
