title: "D3I: A digital data donation infrastructure"
masthead_title: "datadonation.eu"
description: >-
  Europe's data donation infrastructure
baseurl: ""
url: "https://datadonation.eu"

plugins:
  - jekyll-redirect-from
  - jekyll-sitemap
  - jekyll-seo-tag

sass:
  style: compressed
  sourcemap: never

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - migration-backup/
  - docs/
  - "*.backup"

include:
  - _pages
  - .well-known

# Contact defaults
contact_email: DataDonation@uu.nl
contact_subject: "Question about D3I"

# Team member group ordering
team_groups:
  - key: lead
    label: "Lead researchers"
  - key: engineer
    label: "Research engineers"
  - key: methodologist
    label: "Methodologists"
  - key: legal
    label: "Legal scholars"
  - key: affiliated
    label: "Affiliated researchers"
  - key: alumni
    label: "Alumni"

# Collections
collections:
  symposia:
    output: true
    permalink: /community/symposia/:path/

# Publish collection documents dated in the future (e.g. upcoming symposia)
future: true

# Custom URLs
# newsletter_signup_url and phd_network_signup_url were retired when their
# CTAs migrated to structured `cta:` frontmatter on the relevant pages.
# open_letter_url is still consumed by _pages/community/open-letter.md.
open_letter_url: "https://dsa40collaboratory.eu/open-letter-omnibus/"
