backend:
  name: github
  repo: d3i-website/d3i-website.github.io
  branch: cms-staging

site_url: https://datadonation.eu
display_url: https://datadonation.eu
logo_url: https://datadonation.eu/assets/images/datadonation-eu-logo.svg

media_folder: assets/images
public_folder: /assets/images

# ─────────────────────────────────────────────────────────────────────────────
# Collections — top-level entries mirror the site's IA (About D3I, Community,
# etc.). Each section file collection holds the page editors AND the data
# lists for that section, ordered by editor task flow (page first, then its
# supporting data). Dividers inside each `files:` array group the
# subsections (Team, Advisory board, etc.). Symposia stays as a peer entry
# collection because it's editorially different (manager creates new
# entries) — folder collections cannot nest inside file collections.
#
# Sveltia limits: sidebar nesting is two levels (collection → file). The
# `divider:` entries inside files: arrays are an experimental attempt to
# get visual subsection grouping; if Sveltia ignores their `label:` they
# still render as separators. If they fail entirely, dividers can be
# stripped without affecting the schema.
#
# Summary template syntax: list and object summaries use `{{fieldname}}`
# (no `fields.` prefix). Slug/path templates use the `{{fields.X}}` form
# — different system, different parser.
# ─────────────────────────────────────────────────────────────────────────────
collections:

  # ──────────────────────── About D3I ─────────────────────────────────────
  - name: about_d3i
    label: "About D3I"
    icon: account_balance
    description: "Pages and data lists under About D3I (/about-d3i/)."
    files:

      - { divider: true, label: "Team" }
      - file: _pages/about-d3i/team.md
        name: team_page
        label: "Team page"
        icon: article
        description: "The intro prose at /about-d3i/team. Team members themselves are edited in the next entry."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: body
            label: "Intro prose (markdown)"
            widget: markdown
            hint: "Short prose shown above the team grid. Keep it brief — the grid itself is the main content."
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text (optional)", widget: string, required: false }
              - name: bullets
                label: "Bullet points (optional)"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "about-d3i" } }
          - { name: data_section, widget: hidden, default: { type: "people-grid", data: "team" } }
          - { name: permalink, widget: hidden, default: "/about-d3i/team" }
          - { name: layout, widget: hidden, default: "page" }
          - { name: redirect_from, widget: hidden, default: ["/about-the-project/team", "/d3i/team"] }

      - file: _data/team.yml
        name: team_members
        label: "Team members"
        icon: people
        format: yml
        description: "People listed on the Team page, grouped by role."
        fields:
          - name: members
            label: "Members"
            label_singular: "Member"
            widget: list
            summary: "{{name}} — {{role}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: role, label: "Role / title", widget: string }
              - name: group
                label: "Group"
                widget: select
                options:
                  - { label: "Lead researchers", value: lead }
                  - { label: "Research engineers", value: engineer }
                  - { label: "Methodologists", value: methodologist }
                  - { label: "Legal scholars", value: legal }
                  - { label: "Affiliated researchers", value: affiliated }
                  - { label: "Alumni", value: alumni }
              - name: image
                label: "Photo"
                widget: image
                media_folder: /assets/images/people
                public_folder: /assets/images/people
                choose_url: false
                max_file_size: 2097152
                accept: "image/jpeg,image/png,image/svg+xml,image/webp"
              - { name: url, label: "Profile URL", widget: string, required: false }

      - { divider: true, label: "Advisory board" }
      - file: _pages/about-d3i/advisory-board.md
        name: advisory_board_page
        label: "Advisory board page"
        icon: supervisor_account
        description: "The intro prose at /about-d3i/advisory-board. Advisors themselves are edited in the next entry."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: body
            label: "Intro prose (markdown)"
            widget: markdown
            hint: "Short prose shown above the advisors list."
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text (optional)", widget: string, required: false }
              - name: bullets
                label: "Bullet points (optional)"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "about-d3i" } }
          - { name: data_section, widget: hidden, default: { type: "link-list", data: "advisors" } }
          - { name: permalink, widget: hidden, default: "/about-d3i/advisory-board" }
          - { name: layout, widget: hidden, default: "page" }
          - { name: redirect_from, widget: hidden, default: ["/about-the-project/advisory-board"] }

      - file: _data/advisors.yml
        name: advisors_data
        label: "Advisors"
        icon: support_agent
        format: yml
        description: "Members of the advisory board (rendered on /about-d3i/advisory-board)."
        fields:
          - name: advisors
            label: "Advisors"
            label_singular: "Advisor"
            widget: list
            summary: "{{name}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: url, label: "Profile URL", widget: string, required: false }

      - { divider: true, label: "Funding" }
      - file: _pages/about-d3i/funding.md
        name: funding_page
        label: "Funding page"
        icon: paid
        description: "The intro prose at /about-d3i/funding. Funding entries themselves are edited in the next entry."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: body
            label: "Intro prose (markdown)"
            widget: markdown
            hint: "Short prose shown above the funding entries."
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text (optional)", widget: string, required: false }
              - name: bullets
                label: "Bullet points (optional)"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "about-d3i" } }
          - { name: data_section, widget: hidden, default: { type: "funding-list", data: "funding" } }
          - { name: permalink, widget: hidden, default: "/about-d3i/funding" }
          - { name: layout, widget: hidden, default: "page" }
          - { name: redirect_from, widget: hidden, default: ["/about-the-project/funding"] }

      - file: _data/funding.yml
        name: funding_data
        label: "Funding entries"
        icon: payments
        format: yml
        description: "Grants and funders (rendered on /about-d3i/funding)."
        fields:
          - name: funding
            label: "Funding entries"
            label_singular: "Funding entry"
            widget: list
            summary: "{{title}}"
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: period, label: "Period (e.g. 2024 – 2028, or 'permanent')", widget: string, required: false }
              - { name: funder, label: "Funder", widget: string }
              - { name: url, label: "Link (optional)", widget: string, required: false }
              - { name: description, label: "Description", widget: text }

      - { divider: true, label: "Partners" }
      - file: _pages/about-d3i/partners.md
        name: partners_page
        label: "Partners page"
        icon: corporate_fare
        description: "The intro prose at /about-d3i/partners. Partner entries themselves are edited in the next entry."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: body
            label: "Intro prose (markdown — optional)"
            widget: markdown
            required: false
            hint: "Optional intro prose shown above the partners list. Leave blank if none."
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text (optional)", widget: string, required: false }
              - name: bullets
                label: "Bullet points (optional)"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "about-d3i" } }
          - { name: data_section, widget: hidden, default: { type: "info-list", data: "partners" } }
          - { name: permalink, widget: hidden, default: "/about-d3i/partners" }
          - { name: layout, widget: hidden, default: "page" }
          - { name: redirect_from, widget: hidden, default: ["/about-the-project/partners"] }

      - file: _data/partners.yml
        name: partners_data
        label: "Partners"
        icon: handshake
        format: yml
        description: "Partner organizations (rendered on /about-d3i/partners)."
        fields:
          - name: partners
            label: "Partners"
            label_singular: "Partner"
            widget: list
            summary: "{{name}}"
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: url, label: "Website", widget: string, required: false }
              - { name: role, label: "Role / relationship", widget: string, required: false }
              - { name: description, label: "Description", widget: text }

      - { divider: true, label: "Impact and adoption" }
      - file: _pages/about-d3i/impact-and-adoption.md
        name: impact_page
        label: "Impact and adoption page"
        icon: trending_up
        description: "The Impact and adoption page, including usage plots and the 'help us track' CTA."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: body
            label: "Page body (markdown)"
            widget: markdown
            hint: "Prose for the page. The 'Usage plots' field below is rendered automatically after this body — do not add image includes here."
          - name: cta
            label: "Call-to-action button"
            widget: object
            required: false
            collapsed: true
            summary: "{{label}}"
            comment: "Optional styled button rendered immediately after the body, before the bottom contact block. Leave blank if none."
            fields:
              - { name: label, label: "Button text", widget: string, comment: "Don't include the arrow — the layout adds it." }
              - { name: url, label: "URL or mailto link", widget: string, comment: "e.g. https://example.com/form or mailto:foo@bar." }
          - name: usage_images
            label: "Usage plots"
            widget: list
            required: false
            summary: "{{caption}}"
            fields:
              - name: image
                label: "Plot image"
                widget: image
                media_folder: /assets/images/usage
                public_folder: /assets/images/usage
                choose_url: false
                max_file_size: 2097152
                accept: "image/jpeg,image/png,image/svg+xml,image/webp"
              - { name: caption, label: "Caption (also used as alt text)", widget: string }
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text", widget: string, required: false }
              - name: bullets
                label: "Bullet points (optional)"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "about-d3i" } }
          - { name: permalink, widget: hidden, default: "/about-d3i/impact-and-adoption" }
          - { name: layout, widget: hidden, default: "page" }
          - { name: redirect_from, widget: hidden, default: ["/software/usage/"] }

  # ──────────────────────── Community ─────────────────────────────────────
  - name: community
    label: "Community"
    icon: forum
    description: "Pages and data lists under Community (/community/)."
    files:

      - { divider: true, label: "Networks" }
      - file: _pages/community/network.md
        name: networks_page
        label: "Networks page"
        icon: hub
        description: "The Community Networks page, with the institutional and PhD network sections."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: sections
            label: "Page sections"
            widget: list
            label_singular: "Section"
            summary: "{{title}}"
            fields:
              - { name: title, label: "Section title", widget: string }
              - name: image
                label: "Illustration"
                widget: image
                media_folder: /assets/images/hub
                public_folder: /assets/images/hub
                choose_url: false
                max_file_size: 2097152
                accept: "image/jpeg,image/png,image/svg+xml,image/webp"
              - { name: image_alt, label: "Image alt text (required)", widget: string }
              - name: image_side
                label: "Image side"
                widget: select
                options: [left, right]
                default: right
              - name: body
                label: "Section body (markdown)"
                widget: markdown
                hint: "Prose for this section."
              - name: cta
                label: "Section call-to-action button"
                widget: object
                required: false
                collapsed: true
                summary: "{{label}}"
                comment: "Optional styled button rendered immediately after this section's prose, before any embedded component."
                fields:
                  - { name: label, label: "Button text", widget: string, comment: "Don't include the arrow — the layout adds it." }
                  - { name: url, label: "URL or mailto link", widget: string, comment: "e.g. https://example.com/form or mailto:foo@bar." }
              - { name: component_title, label: "Embedded component heading (optional)", widget: string, required: false }
              - { name: component, label: "Embedded component ID (e.g. 'institutions-grid')", widget: string, required: false }
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text", widget: string, required: false }
              - name: bullets
                label: "Bullet points"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "community" } }
          - { name: permalink, widget: hidden, default: "/community/institutional-network" }
          - { name: layout, widget: hidden, default: "page-sections" }
          - { name: classes, widget: hidden, default: "wide" }

      - file: _data/institutions.yml
        name: institutions_data
        label: "Network members (institutions)"
        icon: business
        format: yml
        description: "Partner institutions shown on the Community Networks page."
        fields:
          - name: institutions
            label: "Institutions"
            label_singular: "Institution"
            widget: list
            summary: "{{institution}} — {{country}}"
            fields:
              - { name: institution, label: "Institution name", widget: string }
              - { name: affiliate_name, label: "Affiliate name (person)", widget: string }
              - { name: affiliate_url, label: "Affiliate profile URL", widget: string, required: false }
              - { name: department, label: "Department", widget: string, required: false }
              - { name: country, label: "Country", widget: string }

      - { divider: true, label: "Newsletter" }
      - file: _pages/community/newsletter/index.md
        name: newsletter_page
        label: "Newsletter page"
        icon: feed
        description: "The intro prose at /community/newsletter/. Newsletter issues themselves are edited in the next entry."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: body
            label: "Intro prose (markdown)"
            widget: markdown
            hint: "Short prose introducing the newsletter. The Subscribe button is configured below, not in this prose field."
          - name: cta
            label: "Call-to-action button"
            widget: object
            required: false
            collapsed: true
            summary: "{{label}}"
            comment: "Optional styled button rendered immediately after the body, before the bottom contact block. Leave blank if none."
            fields:
              - { name: label, label: "Button text", widget: string, comment: "Don't include the arrow — the layout adds it." }
              - { name: url, label: "URL or mailto link", widget: string, comment: "e.g. https://example.com/form or mailto:foo@bar." }
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text (optional)", widget: string, required: false }
              - name: bullets
                label: "Bullet points (optional)"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "community" } }
          - { name: hero, widget: hidden, default: { image: "/assets/images/hub/undraw_subscriber_whh0.svg", alt: "A person subscribing to a newsletter." } }
          - { name: archive, widget: hidden, default: { source: "newsletters", heading: "Archive" } }
          - { name: classes, widget: hidden, default: "h-entry" }
          - { name: toc, widget: hidden, default: false }
          - { name: permalink, widget: hidden, default: "/community/newsletter/" }
          - { name: layout, widget: hidden, default: "page-archive-sidebar" }

      - file: _data/newsletters.yml
        name: newsletters_data
        label: "Newsletter issues"
        icon: mail
        format: yml
        description: "Newsletter issues linked from the Newsletter page."
        fields:
          - name: newsletters
            label: "Newsletters"
            label_singular: "Newsletter"
            widget: list
            summary: "{{title}}"
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: date, label: "Date", widget: datetime, type: date }
              - { name: url, label: "URL (site-relative or absolute)", widget: string }
              - { name: summary, label: "Summary", widget: text }
              - { name: link_text, label: "Link text (e.g. 'Open newsletter')", widget: string, required: false }

      - { divider: true, label: "Courses" }
      - file: _pages/community/courses/index.md
        name: courses_page
        label: "Courses page"
        icon: menu_book
        description: "The intro prose at /community/courses/. Course entries themselves are edited in the next entry."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: body
            label: "Intro prose (markdown)"
            widget: markdown
            hint: "Short prose shown above the course archive."
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text (optional)", widget: string, required: false }
              - name: bullets
                label: "Bullet points (optional)"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "community" } }
          - { name: hero, widget: hidden, default: { image: "/assets/images/hub/undraw_group-project_kow1.svg", alt: "A group of people collaborating on a project together." } }
          - { name: archive, widget: hidden, default: { source: "courses", featured_heading: "Upcoming course", heading: "Previous courses" } }
          - { name: toc, widget: hidden, default: false }
          - { name: permalink, widget: hidden, default: "/community/courses/" }
          - { name: layout, widget: hidden, default: "page-archive-stacked" }

      - file: _data/courses.yml
        name: courses_data
        label: "Course entries"
        icon: school
        format: yml
        description: "Workshops and courses listed on the Courses page."
        fields:
          - name: courses
            label: "Courses"
            label_singular: "Course"
            widget: list
            summary: "{{title}}"
            fields:
              - { name: featured, label: "Featured (show prominently)", widget: boolean, required: false, default: false }
              - { name: title, label: "Title", widget: string }
              - { name: summary, label: "Summary", widget: text }
              - { name: date_label, label: "Date label (e.g. 'July 2025') — use for past courses", widget: string, required: false }
              - { name: location, label: "Location (for past courses)", widget: string, required: false }
              - name: details
                label: "Details (label/value pairs; for featured courses)"
                widget: list
                required: false
                summary: "{{label}}: {{value}}"
                fields:
                  - { name: label, label: "Label (e.g. 'When', 'Where')", widget: string }
                  - { name: value, label: "Value", widget: string }
                  - { name: markdown, label: "Value contains markdown?", widget: boolean, required: false, default: false }
              - name: actions
                label: "Actions (buttons)"
                widget: list
                required: false
                summary: "{{label}} → {{url}}"
                fields:
                  - { name: label, label: "Button label", widget: string }
                  - { name: url, label: "URL", widget: string }
                  - { name: external, label: "External link?", widget: boolean, required: false, default: false }

  # ──────────────── Symposia (peer to Community — entry collection) ───────
  # Folder collections cannot nest inside file collections, so Symposia sits
  # as a sibling to the Community section collection. The deliberate
  # decision: every event we acknowledge gets a `_symposia/` page (even if
  # the body is bare and the page mostly links out via external_url). One
  # collection, one rendering pattern, no separate "link-only" data file.
  - name: symposia
    label: "Symposia"
    icon: event
    folder: _symposia
    create: true
    extension: md
    format: yaml-frontmatter
    slug: "symposium-{{fields.date | date('YYYY')}}"
    summary: "{{title}} — {{date}}"
    path: "symposium-{{fields.date | date('YYYY')}}"
    description: "Event pages for symposia and related events. Each entry produces its own page on this site. For events whose primary page lives elsewhere, fill in the External URL field — the manager can still write a brief frontmatter entry here so the event appears in the symposia archive. Add a new symposium with the '+' button."
    fields:
      - { name: title, label: "Title", widget: string }
      - name: date
        label: "Start date"
        widget: datetime
        type: date
        comment: "Used to determine if the symposium is upcoming or past."
      - name: end_date
        label: "End date"
        widget: datetime
        type: date
        required: false
        comment: "Optional. If set, used for the upcoming/past decision instead of start date."
      - { name: location, label: "Location", widget: string }
      - { name: summary, label: "Short summary (used in cards)", widget: text }
      - name: featured
        label: "Spotlight this symposium?"
        widget: boolean
        required: false
        default: false
        comment: "Spotlights this symposium in the upcoming-event hero slot on /community/symposia. Only meaningful for upcoming events; past events ignore this flag (the layout uses dates to classify upcoming vs. past automatically)."
      - { name: external_url, label: "External URL (event website)", widget: string, required: false }
      - name: details
        label: "Detail rows (shown on the event page)"
        widget: list
        required: false
        summary: "{{label}}: {{value}}"
        fields:
          - { name: label, label: "Label", widget: string }
          - { name: value, label: "Value", widget: string }
          - { name: markdown, label: "Value contains markdown?", widget: boolean, required: false, default: false }
      - name: actions
        label: "Action buttons"
        widget: list
        required: false
        summary: "{{label}} → {{url}}"
        fields:
          - { name: label, label: "Button label", widget: string }
          - { name: url, label: "URL", widget: string }
          - { name: external, label: "External link?", widget: boolean, required: false, default: true }
      - { name: layout, widget: hidden, default: "page" }
      - { name: sidebar, widget: hidden, default: { nav: "community" } }
      - { name: body, label: "Full event page content (markdown)", widget: markdown }

  # ──────────────────────── Prepare a Study ───────────────────────────────
  - name: prepare_a_study
    label: "Prepare a Study"
    icon: science
    description: "Pages and data lists under Prepare a Study (/prepare-a-study/)."
    files:

      - { divider: true, label: "Completed projects" }
      - file: _pages/prepare-a-study/completed-projects.md
        name: completed_projects_page
        label: "Completed projects page"
        icon: task_alt
        description: "The intro prose at /prepare-a-study/completed-projects/. Project entries themselves are edited in the next entry."
        fields:
          - { name: title, label: "Page title", widget: string }
          - { name: excerpt, label: "Page blurb", widget: string, maxlength: 200, comment: "Short one-line description (15-30 words). Used on landing pages that list this page, and in social-sharing previews." }
          - name: body
            label: "Intro prose (markdown)"
            widget: markdown
            hint: "Short prose shown above the projects list."
          - name: contact
            label: "Contact CTA"
            widget: object
            collapsed: true
            summary: "{{lead}}"
            comment: "Renders as the contact CTA block at the bottom of the page."
            fields:
              - { name: lead, label: "Heading", widget: string }
              - { name: intro, label: "Intro text (optional)", widget: string, required: false }
              - name: bullets
                label: "Bullet points (optional)"
                widget: list
                required: false
                field: { name: bullet, widget: string }
              - { name: email, label: "Email address", widget: string, type: email }
              - { name: subject, label: "Email subject", widget: string }
          - { name: sidebar, widget: hidden, default: { nav: "prepare-a-study" } }
          - { name: data_section, widget: hidden, default: { type: "project-list", data: "completed-projects" } }
          - { name: permalink, widget: hidden, default: "/prepare-a-study/completed-projects/" }
          - { name: layout, widget: hidden, default: "page" }

      - file: _data/completed-projects.yml
        name: completed_projects_data
        label: "Completed project entries"
        icon: inventory_2
        format: yml
        description: "Finished studies shown on the Completed projects page."
        fields:
          - name: completed_projects
            label: "Projects"
            label_singular: "Project"
            widget: list
            summary: "{{title}} ({{year}})"
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: year, label: "Year", widget: number, value_type: int, min: 2000, max: 2100 }
              - name: image
                label: "Cover image"
                widget: image
                required: false
                media_folder: /assets/images/completed-projects
                public_folder: /assets/images/completed-projects
                choose_url: false
                max_file_size: 2097152
                accept: "image/jpeg,image/png,image/svg+xml,image/webp"
              - { name: image_credit, label: "Image credit (text)", widget: string, required: false }
              - { name: image_credit_url, label: "Image credit URL", widget: string, required: false }
              - { name: investigators, label: "Investigators (markdown)", widget: text }
              - { name: summary, label: "Summary (markdown)", widget: text }
              - { name: collection_period, label: "Data collection period", widget: string, required: false }
              - { name: recruitment, label: "Recruitment (markdown)", widget: text, required: false }
              - { name: instructions, label: "Instructions (markdown)", widget: text, required: false }
              - { name: ethical_review, label: "Ethical review (markdown)", widget: text, required: false }
              - { name: software, label: "Software used", widget: string, required: false }
              - { name: local_processing, label: "Local processing link (markdown)", widget: text, required: false }
              - { name: data, label: "Data availability (markdown)", widget: text, required: false }
              - { name: acknowledgements, label: "Acknowledgements (markdown)", widget: text, required: false }
              - name: references
                label: "References"
                widget: list
                required: false
                field: { name: reference, label: "Reference (markdown)", widget: text }

